# @package _global_

defaults:
  - dg_2pretrain_multimodel
  - _self_

name: "dg_2pretrain_smoke"

# Fast validation config that preserves the dg_2pretrain benchmark layout.
data:
  seeds_val: [1000]
  seeds_test: [2000]

trainer:
  max_tasks_seen: 64000
  log_every_n_tasks: 3200
  val_check_interval_tasks: 16000
  checkpoint_every_n_tasks: 32000

inference:
  n_samples: 8
  cache_compress: false
  cache_n_samples: null
  dibs:
    steps: 50
    n_particles: 8
  bayesdag:
    max_epochs: 5
    num_chains: 2
    batch_size: 512
    external_timeout_s: 600

hydra:
  run:
    dir: ${oc.env:CAUSAL_META_RUN_DIR,experiments/runs/${name}}
  sweep:
    dir: ${oc.env:CAUSAL_META_SWEEP_DIR,experiments/runs/${name}}
    subdir: "${model.id}"
  output_subdir: null
  sweeper:
    max_batch_size: 1
    params:
      model: avici,bcnp,dibs,bayesdag
