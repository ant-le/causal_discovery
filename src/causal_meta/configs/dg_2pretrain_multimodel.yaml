      n_nodes: 40
      samples_per_task: 500
      graph_cfg: *graph_ws
      mech_cfg: *mech_gpcde

    #    M4. Dense OOD graph + hard mechanism + low data (triple stress)
    stress_grg_logistic_d40_n100:
      name: stress_grg_logistic_d40_n100
      n_nodes: 40
      samples_per_task: 100
      graph_cfg: *graph_grg
      mech_cfg: *mech_logistic_map

    stress_ws_periodic_d40_n100:
      name: stress_ws_periodic_d40_n100
      n_nodes: 40
      samples_per_task: 100
      graph_cfg: *graph_ws
      mech_cfg: *mech_periodic

    # ── N. Real-World Benchmark ────────────────────────────────────────
    #    Sachs (11 nodes, 17 edges): classic phosphoprotein signaling
    #    network. Auto-downloaded on first use.
    real_sachs:
      name: real_sachs
      type: real_world
      loader: sachs
      n_nodes: 11

trainer:
  accumulate_grad_batches: 4
  validation_n_samples: 16
  validation_metrics: [e-edgef1, ne-sid, ne-shd, valid_dag_pct]
  validation_log_per_family: false
  validation_selection_metric: mean_id_e-edgef1
  validation_group_prefixes:
    id: [id_]
    ood_graph: [ood_graph_]
    ood_mech: [ood_mech_]
    ood_noise: [ood_noise_]
    ood_both: [ood_both_]
    ood_nodes: [ood_nodes_]
    ood_samples: [ood_samples_]
    ood_mixed: [ood_mixed_]
    ood_noise_mech: [ood_noise_mech_]
    ctrl_mixed: [ctrl_mixed_]
    ctrl_density: [ctrl_density_]
    stress: [stress_]
    real: [real_]

inference:
  # n_samples is now specified via data.inference_n_samples (global default)
  # and per-family inference_n_samples overrides. The value below serves as a
  # backward-compatible fallback and feeds cache_n_samples.
  n_samples: ${data.inference_n_samples}

hydra:
  run:
    dir: ${oc.env:CAUSAL_META_RUN_DIR,experiments/runs/${name}}
  sweep:
    dir: ${oc.env:CAUSAL_META_SWEEP_DIR,experiments/runs/${name}}
    subdir: "${model.id}"
  output_subdir: null
  sweeper:
    params:
      model: avici,bcnp,dibs,bayesdag,random
