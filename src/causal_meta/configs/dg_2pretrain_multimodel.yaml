      samples_per_task: 2000
      graph_cfg: *graph_sf2
      mech_cfg: *mech_neuralnet

    # ── H. Extreme Stress-Test Families ────────────────────────────────
    ood_both_grg_logistic_map_d60_n50:
      name: ood_both_grg_logistic_map_d60_n50
      n_nodes: 60
      samples_per_task: 50
      graph_cfg: *graph_grg
      mech_cfg: *mech_logistic_map

