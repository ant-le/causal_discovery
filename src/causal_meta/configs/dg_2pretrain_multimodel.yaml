      name: ood_both_sbm_periodic_d60_n100
      n_nodes: 60
      samples_per_task: 100
      graph_cfg: *graph_sbm
      mech_cfg: *mech_periodic

    # ── I. Mixed-Mechanism Test Families ───────────────────────────────
    #    Tests whether models exploit the per-node mechanism heterogeneity
    #    seen during training or break on homogeneous-to-mixed mismatch.
    #    I-ctrl uses a 50/50 ID-only mixture (Linear+MLP) as a baseline
    #    so per-node heterogeneity effects can be separated from OOD
    #    mechanism effects. The remaining families use ID+OOD mixtures.
