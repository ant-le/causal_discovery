      n_nodes: 20
      samples_per_task: 500
      graph_cfg: *graph_sf2
      mech_cfg: *mech_pnl_sigmoid

    ood_mech_pnl_cube_sf2_d20_n500:
      name: ood_mech_pnl_cube_sf2_d20_n500
      n_nodes: 20
      samples_per_task: 500
      graph_cfg: *graph_sf2
      mech_cfg: *mech_pnl_cube

    # ── L. OOD Noise × OOD Mechanism Interaction ──────────────────────
    #    Tests whether noise and mechanism shifts interact super-additively.
    #    Uses ER20 anchor with OOD mechanisms under non-Gaussian noise.
    ood_noise_mech_laplace_periodic_er20_d20_n500:
      name: ood_noise_mech_laplace_periodic_er20_d20_n500
      n_nodes: 20
      samples_per_task: 500
      graph_cfg: *graph_er20
      mech_cfg: *mech_periodic
      noise_type: laplace

