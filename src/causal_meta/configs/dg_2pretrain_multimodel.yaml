      name: ctrl_mixed_linear_mlp_er20_d20_n500
      n_nodes: 20
      samples_per_task: 500
      graph_cfg: *graph_er20
      mech_cfg:
        type: mixture
        weights: [0.5, 0.5]
        factories:
          - *mech_linear
          - *mech_neuralnet

    ood_mixed_linear_periodic_er20_d20_n500:
      name: ood_mixed_linear_periodic_er20_d20_n500
      n_nodes: 20
      samples_per_task: 500
      graph_cfg: *graph_er20
      mech_cfg:
