    ood_samples_neuralnet_sf2_d20_n750:
      name: ood_samples_neuralnet_sf2_d20_n750
      n_nodes: 20
      samples_per_task: 750
      graph_cfg: *graph_sf2
      mech_cfg: *mech_neuralnet

    ood_samples_neuralnet_sf2_d20_n1000:
      name: ood_samples_neuralnet_sf2_d20_n1000
      n_nodes: 20
      samples_per_task: 1000
