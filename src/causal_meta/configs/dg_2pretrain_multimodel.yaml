        weights: [0.5, 0.5]
        factories:
          - *mech_linear
          - *mech_pnl_tanh

    # ── J. Density-Matched ER Controls ─────────────────────────────────
    #    One ER graph per OOD topology, matched on expected edge count,
    #    so topology vs. density effects can be separated.
    #    Tested with Linear (simple) and MLP (nonlinear) mechanisms.
    ctrl_density_er_match_sbm_linear_d20_n500:
      name: ctrl_density_er_match_sbm_linear_d20_n500
      n_nodes: 20
      samples_per_task: 500
      graph_cfg: *graph_er_match_sbm
      mech_cfg: *mech_linear

    ctrl_density_er_match_sbm_neuralnet_d20_n500:
      name: ctrl_density_er_match_sbm_neuralnet_d20_n500
      n_nodes: 20
      samples_per_task: 500
      graph_cfg: *graph_er_match_sbm
      mech_cfg: *mech_neuralnet

    ctrl_density_er_match_ws_linear_d20_n500:
      name: ctrl_density_er_match_ws_linear_d20_n500
      n_nodes: 20
      samples_per_task: 500
      graph_cfg: *graph_er_match_ws
      mech_cfg: *mech_linear

    ctrl_density_er_match_ws_neuralnet_d20_n500:
      name: ctrl_density_er_match_ws_neuralnet_d20_n500
      n_nodes: 20
      samples_per_task: 500
      graph_cfg: *graph_er_match_ws
      mech_cfg: *mech_neuralnet

    ctrl_density_er_match_grg_linear_d20_n500:
      name: ctrl_density_er_match_grg_linear_d20_n500
      n_nodes: 20
      samples_per_task: 500
      graph_cfg: *graph_er_match_grg
      mech_cfg: *mech_linear

    ctrl_density_er_match_grg_neuralnet_d20_n500:
      name: ctrl_density_er_match_grg_neuralnet_d20_n500
      n_nodes: 20
      samples_per_task: 500
      graph_cfg: *graph_er_match_grg
      mech_cfg: *mech_neuralnet

    # ── K. PNL-Sigmoid and PNL-Cube OOD Variants ──────────────────────
    #    Tests whether PNL degradation is driven by the PNL structure
    #    itself or by the specific outer nonlinearity (tanh vs sigmoid vs cube).
    ood_mech_pnl_sigmoid_er20_d20_n500:
      name: ood_mech_pnl_sigmoid_er20_d20_n500
      n_nodes: 20
      samples_per_task: 500
      graph_cfg: *graph_er20
      mech_cfg: *mech_pnl_sigmoid

    ood_mech_pnl_cube_er20_d20_n500:
      name: ood_mech_pnl_cube_er20_d20_n500
      n_nodes: 20
      samples_per_task: 500
      graph_cfg: *graph_er20
      mech_cfg: *mech_pnl_cube

    ood_mech_pnl_sigmoid_sf2_d20_n500:
