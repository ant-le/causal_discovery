      n_nodes: 20
      samples_per_task: 500
      graph_cfg: *graph_er20
      mech_cfg: *mech_periodic
      noise_type: uniform

    ood_noise_mech_laplace_logistic_er20_d20_n500:
      name: ood_noise_mech_laplace_logistic_er20_d20_n500
      n_nodes: 20
      samples_per_task: 500
