      n_nodes: 40
      samples_per_task: 500
      graph_cfg: *graph_er20
      mech_cfg: *mech_logistic_map

    stress_logistic_er20_d50_n500:
      name: stress_logistic_er20_d50_n500
      n_nodes: 50
      samples_per_task: 500
      graph_cfg: *graph_er20
      mech_cfg: *mech_logistic_map

    #    M2. Mechanism shift under low-data regime (mechanism × sample interaction)
    stress_periodic_er20_d20_n100:
      name: stress_periodic_er20_d20_n100
      n_nodes: 20
      samples_per_task: 100
      graph_cfg: *graph_er20
      mech_cfg: *mech_periodic

    stress_periodic_er20_d20_n50:
      name: stress_periodic_er20_d20_n50
      n_nodes: 20
      samples_per_task: 50
      graph_cfg: *graph_er20
      mech_cfg: *mech_periodic

    stress_logistic_er20_d20_n100:
      name: stress_logistic_er20_d20_n100
      n_nodes: 20
      samples_per_task: 100
      graph_cfg: *graph_er20
      mech_cfg: *mech_logistic_map

    stress_logistic_er20_d20_n50:
      name: stress_logistic_er20_d20_n50
      n_nodes: 20
      samples_per_task: 50
      graph_cfg: *graph_er20
      mech_cfg: *mech_logistic_map

    #    M3. OOD graph at training-boundary node count (interpolation edge)
    stress_sbm_linear_d40_n500:
      name: stress_sbm_linear_d40_n500
      n_nodes: 40
      samples_per_task: 500
      graph_cfg: *graph_sbm
      mech_cfg: *mech_linear

    stress_grg_mlp_d40_n500:
