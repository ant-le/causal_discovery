      n_nodes: 20
      samples_per_task: 500
      graph_cfg: *graph_er20
      mech_cfg: *mech_logistic_map
      noise_type: uniform

    # ── M. Nuanced Stress Tests ────────────────────────────────────────
    #    Graduated stress tests probing specific failure modes identified
    #    in prior results: logistic FP explosion, linear DAG collapse at
    #    scale, and the boundary between interpolation and extrapolation.
    #
    #    M1. Logistic map at increasing graph sizes (FP scaling)
    stress_logistic_er20_d20_n500:
      name: stress_logistic_er20_d20_n500
      n_nodes: 20
      samples_per_task: 500
      graph_cfg: *graph_er20
      mech_cfg: *mech_logistic_map

    stress_logistic_er20_d30_n500:
