trainer:
  accumulate_grad_batches: 4
  validation_n_samples: 16
  validation_metrics: [e-edgef1, ne-sid, ne-shd, valid_dag_pct]
  validation_log_per_family: false
  validation_selection_metric: mean_id_e-edgef1

inference:
  n_samples: 100

hydra:
  run:
    dir: ${oc.env:CAUSAL_META_RUN_DIR,experiments/runs/${name}}
  sweep:
    dir: ${oc.env:CAUSAL_META_SWEEP_DIR,experiments/runs/${name}}
    subdir: "${model.id}"
  output_subdir: null
  sweeper:
    params:
      model: avici,bcnp,dibs,bayesdag
