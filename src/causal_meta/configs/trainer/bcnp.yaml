# @package trainer

# BCNP canonical benchmark profile.
# Mirrors the long-run amortized defaults explicitly so BCNP and AVICI both
# have model-selected trainer profiles.

lr: 0.0001
weight_decay: 1e-4
accumulate_grad_batches: 1
lr_scale_with_global_batch_sqrt: false
lr_reference_global_tasks_per_step: 1

max_tasks_seen: 16000000
log_every_n_tasks: 3200
val_check_interval_tasks: 160000
checkpoint_every_n_tasks: 1600000

amp: true
amp_dtype: bf16
grad_clip_norm: 1.0

scheduler: cosine
scheduler_t_max_tasks: ${trainer.max_tasks_seen}
scheduler_eta_min: 0.0
scheduler_warmup_ratio: 0.02
scheduler_warmup_start_factor: 0.001
scheduler_milestones_tasks: []
scheduler_gamma: 0.1

regulariser_update_interval: 0

validation_n_samples: 16
validation_metrics: [e-edgef1, ne-sid, ne-shd, valid_dag_pct]
validation_log_per_family: false
validation_selection_metric: mean_ood_ne-sid
validation_selection_mode: min
validation_group_prefixes:
  id: [id_]
  ood_graph: [ood_graph_]
  ood_mech: [ood_mech_]
  ood_noise: [ood_noise_]
  ood_both: [ood_both_]
  ood_nodes: [ood_nodes_]
  ood_samples: [ood_samples_]
