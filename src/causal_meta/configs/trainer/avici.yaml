# @package trainer

# AVICI benchmark profile within the shared amortized-training schema.
#
# Preserve the AVICI paper's optimizer ratios where possible:
# - LR drop x0.1 after roughly 2/3 of training
# - global grad clip norm 1
# - dual update every 500 primal steps

# Fix the global task batch at 32 and absorb the AVICI paper's sqrt-batch
# scaling into a constant AdamW learning rate.
lr: 1.7e-4

scheduler: multistep
# Preserve AVICI paper ratio for LR decay (200k / 300k).
scheduler_milestones_steps: [333333]
scheduler_gamma: 0.1
scheduler_warmup_ratio: 0.0

regulariser_update_interval_steps: 500
validation_selection_metric: mean_ood_ne-sid
validation_selection_mode: min
