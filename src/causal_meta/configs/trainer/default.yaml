# @package trainer

lr: 0.0001
weight_decay: 1e-4
accumulate_grad_batches: 1

# Paper reproduction defaults (section 4.2).
# This preserves the historical single-GPU effective budget for the default
# full-data setup (32 tasks/step for 500,000 optimizer steps).
max_tasks_seen: 16000000
log_every_n_tasks: 3200
val_check_interval_tasks: 160000
checkpoint_every_n_tasks: 1600000

amp: true
amp_dtype: bf16
grad_clip_norm: 1.0

scheduler: cosine
scheduler_t_max_tasks: ${trainer.max_tasks_seen}
scheduler_eta_min: 0.0
# Shorter warmup improves stability for long BCNP runs.
scheduler_warmup_ratio: 0.02
scheduler_warmup_start_factor: 0.001

# AVICI acyclicity dual update cadence (paper style).
regulariser_update_interval: 500

# Validation controls.
validation_n_samples: 16
validation_metrics: [e-edgef1, ne-sid, ne-shd, valid_dag_pct]
validation_log_per_family: false
validation_selection_metric: mean_ood_ne-sid
validation_group_prefixes:
  id: [id_]
  ood_graph: [ood_graph_]
  ood_mech: [ood_mech_]
  ood_both: [ood_both_]
  ood_nodes: [ood_nodes_]
  ood_samples: [ood_samples_]
