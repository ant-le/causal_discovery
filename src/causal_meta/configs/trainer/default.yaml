# @package trainer

lr: 0.0001
weight_decay: 1e-4
accumulate_grad_batches: 1

# Paper reproduction defaults (section 4.2).
max_steps: 500000
log_every_n_steps: 100
val_check_interval: 5000
checkpoint_every_n_steps: 50000

amp: true
amp_dtype: bf16
grad_clip_norm: 1.0

scheduler: cosine
scheduler_t_max: ${trainer.max_steps}
scheduler_eta_min: 0.0
# Shorter warmup improves stability for long BCNP runs.
scheduler_warmup_ratio: 0.02
scheduler_warmup_start_factor: 0.001

# AVICI acyclicity dual update cadence (paper style).
regulariser_update_interval: 100

# Validation controls.
validation_n_samples: 16
validation_metrics: [e-edgef1, ne-sid, ne-shd, valid_dag_pct]
validation_log_per_family: false
validation_selection_metric: mean_id_e-edgef1
validation_group_prefixes:
  id: [id_]
  ood_graph: [ood_graph_]
  ood_mech: [ood_mech_]
  ood_both: [ood_both_]
  ood_nodes: [ood_nodes_]
  ood_samples: [ood_samples_]
