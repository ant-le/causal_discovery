# @package model

type: "bayesdag"
id: "bayesdag"

# BayesDAG explicit inference parameters.
# Aligned with the official Project-BayesDAG base configs:
#   bayesdag_nonlinear.json  (search grid for custom data)
#   bayesdag_nonlinear_train_syntren.json  (tuned for SynTReN, d=20, N=500)
#   bayesdag_nonlinear_er_20_40.json  (tuned for ER, d=20)
# See https://github.com/microsoft/Project-BayesDAG
variant: "nonlinear"
lambda_sparse: 300.0

# Long-run settings for explicit comparisons.
# sinkhorn_n_iter=300 matches the official base config default.
num_chains: 10
sinkhorn_n_iter: 300

# Noise scale parameters — matched to official SynTReN config.
scale_noise: 0.01
scale_noise_p: 0.1
batch_size: 256
max_epochs: 400

standardize_data_mean: false
standardize_data_std: false
skip_evaluation: true

# Architecture flags — matched to official nonlinear base config.
norm_layers: true
res_connection: true
vi_norm: true
input_perm: false
sparse_init: false

# Keep BayesDAG's internal logs/artifacts inside the run folder.
save_dir: ${hydra:runtime.output_dir}/bayesdag_output

external_python: ${oc.env:CAUSAL_META_BAYESDAG_PYTHON,null}
external_timeout_s: 3600
device: "auto"

# Per-family profiles.  Families not listed here fall back to the
# top-level defaults above.  Only variant, lambda_sparse, num_chains,
# scale_noise, and scale_noise_p are overridable per profile.
#
# Profile naming: mechanism (+ optional graph suffix)
# ID graphs:
#   - "linear": sparse graphs (ER20, SF1), ~20 edges
#   - "linear_er40": medium density ~40 edges
#   - "linear_er60": dense ~60 edges
#   - "linear_sf2": hub-based ~40 edges
#   - "linear_sf3": hub-based ~60 edges
#   - "neuralnet": MLP mechanism (struggles with all graphs)
#   - "gpcde": GP mechanism
# OOD graphs:
#   - "linear_sbm": block model ~moderate density
#   - "linear_ws": small-world ~moderate density
#   - "linear_grg": geometric ~moderate density
profile_overrides:
  linear:
    variant: "linear"
    lambda_sparse: 300.0
    num_chains: 20
    scale_noise: 0.01
    scale_noise_p: 1.0
  linear_er40:
    variant: "linear"
    lambda_sparse: 150.0
    num_chains: 20
    scale_noise: 0.01
    scale_noise_p: 1.0
  linear_er60:
    variant: "linear"
    lambda_sparse: 75.0
    num_chains: 20
    scale_noise: 0.01
    scale_noise_p: 1.0
  linear_sf2:
    variant: "linear"
    lambda_sparse: 150.0
    num_chains: 20
    scale_noise: 0.01
    scale_noise_p: 1.0
  linear_sf3:
    variant: "linear"
    lambda_sparse: 75.0
    num_chains: 20
    scale_noise: 0.01
    scale_noise_p: 1.0
  linear_sbm:
    variant: "linear"
    lambda_sparse: 150.0
    num_chains: 20
    scale_noise: 0.01
    scale_noise_p: 1.0
  linear_ws:
    variant: "linear"
    lambda_sparse: 150.0
    num_chains: 20
    scale_noise: 0.01
    scale_noise_p: 1.0
  linear_grg:
    variant: "linear"
    lambda_sparse: 150.0
    num_chains: 20
    scale_noise: 0.01
    scale_noise_p: 1.0
  neuralnet:
    variant: "nonlinear"
    lambda_sparse: 75.0
    num_chains: 10
    scale_noise: 0.01
    scale_noise_p: 0.1
  neuralnet_er40:
    variant: "nonlinear"
    lambda_sparse: 50.0
    num_chains: 10
    scale_noise: 0.01
    scale_noise_p: 0.1
  neuralnet_er60:
    variant: "nonlinear"
    lambda_sparse: 30.0
    num_chains: 10
    scale_noise: 0.01
    scale_noise_p: 0.1
  neuralnet_sf2:
    variant: "nonlinear"
    lambda_sparse: 75.0
    num_chains: 10
    scale_noise: 0.01
    scale_noise_p: 0.1
  neuralnet_sf3:
    variant: "nonlinear"
    lambda_sparse: 75.0
    num_chains: 10
    scale_noise: 0.01
    scale_noise_p: 0.1
  neuralnet_sbm:
