# @package model

type: "dibs"
id: "dibs"

# DiBS explicit inference parameters.
mode: "nonlinear"
steps: 3000
seed: 0
use_marginal: false
xla_preallocate: false
external_process: true
external_python: ${oc.env:CAUSAL_META_DIBS_PYTHON,null}
external_timeout_s: 3600

# Default profile — JointDiBS nonlinear (used when dataset family
# cannot be mapped to a more specific profile).
# alpha_linear controls sigmoid inverse-temperature annealing: α(t) = alpha * t.
# gamma_z  → SVGD kernel bandwidth for latent Z particles (h_latent).
# gamma_theta → SVGD kernel bandwidth for Θ particles (h_theta).
alpha: 0.05
gamma_z: 5.0
gamma_theta: 500.0
n_particles: 32

# Global override applied first to all profiles.
# n_particles: 64 improves posterior approximation (paper used 30 particles).
# Higher gamma_z for denser graphs (SF, OOD graphs) improves particle spread.
profile_overrides:
  _global:
    n_particles: 64

  # Linear (Gaussian) - paper-aligned with more particles
  linear:
    mode: "linear"
    alpha: 0.05
    gamma_z: 5.0
    gamma_theta: 500.0
    n_particles: 64

  # Neuralnet (MLP) - nonlinear mode, tuned for hub structures
  neuralnet:
    mode: "nonlinear"
    alpha: 0.05
    gamma_z: 8.0
    gamma_theta: 500.0
    n_particles: 64

  # GP/DE - nonlinear mode, similar to neuralnet
  gpcde:
    mode: "nonlinear"
    alpha: 0.05
    gamma_z: 8.0
    gamma_theta: 500.0
    n_particles: 64

  # Scale-free graph variants - higher gamma_z for hub structures
  linear_sf2:
    mode: "linear"
    alpha: 0.05
    gamma_z: 10.0
    gamma_theta: 500.0
    n_particles: 64

  linear_sf3:
    mode: "linear"
    alpha: 0.05
    gamma_z: 12.0
    gamma_theta: 500.0
    n_particles: 64

  neuralnet_sf2:
    mode: "nonlinear"
    alpha: 0.05
    gamma_z: 12.0
    gamma_theta: 500.0
    n_particles: 64

  neuralnet_sf3:
    mode: "nonlinear"
    alpha: 0.05
    gamma_z: 15.0
    gamma_theta: 500.0
    n_particles: 64

  gpcde_sf2:
    mode: "nonlinear"
    alpha: 0.05
    gamma_z: 12.0
    gamma_theta: 500.0
    n_particles: 64

  gpcde_sf3:
    mode: "nonlinear"
    alpha: 0.05
    gamma_z: 15.0
    gamma_theta: 500.0
    n_particles: 64

  # Dense ER graphs - medium gamma_z tuning
  linear_er40:
    mode: "linear"
    alpha: 0.05
    gamma_z: 6.0
    gamma_theta: 500.0
    n_particles: 64

  linear_er60:
    mode: "linear"
    alpha: 0.05
    gamma_z: 8.0
    gamma_theta: 500.0
    n_particles: 64

  neuralnet_er40:
    mode: "nonlinear"
    alpha: 0.05
    gamma_z: 10.0
    gamma_theta: 500.0
    n_particles: 64

  neuralnet_er60:
    mode: "nonlinear"
    alpha: 0.05
    gamma_z: 12.0
    gamma_theta: 500.0
    n_particles: 64

  gpcde_er40:
    mode: "nonlinear"
    alpha: 0.05
    gamma_z: 10.0
    gamma_theta: 500.0
    n_particles: 64

  gpcde_er60:
    mode: "nonlinear"
    alpha: 0.05
    gamma_z: 12.0
    gamma_theta: 500.0
    n_particles: 64

  # OOD graphs: SBM, WS, GRG - need higher gamma_z for different structures
  linear_sbm:
    mode: "linear"
    alpha: 0.05
    gamma_z: 8.0
    gamma_theta: 500.0
    n_particles: 64

  linear_ws:
    mode: "linear"
    alpha: 0.05
    gamma_z: 8.0
    gamma_theta: 500.0
    n_particles: 64

  linear_grg:
    mode: "linear"
    alpha: 0.05
    gamma_z: 8.0
    gamma_theta: 500.0
    n_particles: 64

  neuralnet_sbm:
    mode: "nonlinear"
    alpha: 0.05
    gamma_z: 12.0
    gamma_theta: 500.0
    n_particles: 64

  neuralnet_ws:
    mode: "nonlinear"
    alpha: 0.05
    gamma_z: 12.0
    gamma_theta: 500.0
    n_particles: 64

  neuralnet_grg:
    mode: "nonlinear"
    alpha: 0.05
    gamma_z: 12.0
    gamma_theta: 500.0
    n_particles: 64

  gpcde_sbm:
    mode: "nonlinear"
    alpha: 0.05
    gamma_z: 12.0
    gamma_theta: 500.0
    n_particles: 64

  gpcde_ws:
    mode: "nonlinear"
    alpha: 0.05
    gamma_z: 12.0
    gamma_theta: 500.0
    n_particles: 64

  gpcde_grg:
    mode: "nonlinear"
    alpha: 0.05
    gamma_z: 12.0
    gamma_theta: 500.0
    n_particles: 64

  # OOD mechanisms (periodic, square, logistic, pnl) - use gpcde as base
  # Note: logistic/square are fundamentally hard for DiBS (linear/Gaussian assumption)
  periodic:
    mode: "nonlinear"
    alpha: 0.05
    gamma_z: 10.0
    gamma_theta: 500.0
    n_particles: 64

  square:
    mode: "nonlinear"
    alpha: 0.05
    gamma_z: 10.0
    gamma_theta: 500.0
    n_particles: 64

  logistic:
    mode: "nonlinear"
    alpha: 0.08
    gamma_z: 15.0
    gamma_theta: 500.0
    n_particles: 64

  pnl:
    mode: "nonlinear"
    alpha: 0.05
    gamma_z: 10.0
    gamma_theta: 500.0
    n_particles: 64
