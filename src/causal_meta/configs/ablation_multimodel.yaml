# @package _global_

defaults:
  - logger: wandb
  - data: ablation_er_sf_full
  - model: bcnp
  - trainer: default
  - inference: default
  - _self_

# Training-diversity ablation umbrella config.
# Typical usage is per-model submission with an explicit data override,
# e.g. `data=ablation_linear_only`.
name: "rq1_ablation_multimodel"

hydra:
  run:
    dir: ${oc.env:CAUSAL_META_RUN_DIR,experiments/runs/${name}}
  sweep:
    dir: ${oc.env:CAUSAL_META_SWEEP_DIR,experiments/runs/${name}}
    subdir: "${model.id}_${hydra.job.num}"
  output_subdir: null
  sweeper:
    params:
      model: avici,bcnp
