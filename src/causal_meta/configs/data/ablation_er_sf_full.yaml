# @package data

defaults:
  - _base
  - _self_

# ════════════════════════════════════════════════════════════════════════
# Ablation baseline: Full diversity (ER + SF graphs, Linear + MLP + GP)
#
# Training distribution:
#   Graphs : ER(20/40/60) + SF(m=1,2,3)  → 6 generators
#   Mechs  : Linear, MLP, GP             → 3 factories
#
# Purpose: Explicit full-diversity baseline for ablation comparisons.
# This is functionally identical to full.yaml's training distribution
# but exists as a named ablation config so that all four ablation runs
# share a uniform naming convention and can be referenced together.
# ════════════════════════════════════════════════════════════════════════

seeds_val: [1000, 1001, 1002, 1003, 1004]
seeds_test:
  [
    2000,
    2001,
    2002,
    2003,
    2004,
    2005,
    2006,
    2007,
    2008,
    2009,
    2010,
    2011,
    2012,
    2013,
    2014,
    2015,
    2016,
    2017,
    2018,
    2019,
    2020,
    2021,
    2022,
    2023,
    2024,
  ]
num_workers: 4
pin_memory: true
batch_size_train: 32

# Training family inherited from _base unchanged — just give it an
# explicit ablation name for provenance tracking.
train_family:
  name: ablation_er_sf_full_train

  graph_cfg:
    type: mixture
    weights: [0.1667, 0.1667, 0.1667, 0.1667, 0.1667, 0.1665]
    generators:
      - type: er
        sparsity: 0.0526
      - type: er
        sparsity: 0.1053
      - type: er
        sparsity: 0.1579
      - type: sf
        m: 1
      - type: sf
        m: 2
      - type: sf
        m: 3

  mech_cfg:
    type: mixture
    weights: [0.3333, 0.3333, 0.3334]
    factories:
      - type: linear
        weight_scale: 10.0
        noise_concentration: 2.0
        noise_rate: 2.0
      - type: mlp
        hidden_dim: 32
      - type: gp
        mode: approximate
        rff_dim: 512
        num_kernels: 4
        length_scale_range: [0.1, 10.0]
        variance_range: [0.1, 10.0]

# ════════════════════════════════════════════════════════════════════════
