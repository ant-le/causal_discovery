# @package inference.bayesdag

# Canonical BayesDAG settings for explicit comparisons.
#
# Provenance:
# - top-level defaults follow the official Project-BayesDAG base configs for
#   nonlinear custom-data runs
# - density-specific profiles use the paper-backed / official config variants
#   already referenced in the thesis notes and fall back to the nearest
#   available graph/mechanism profile when the benchmark family is unsupported

variant: "nonlinear"
lambda_sparse: 300.0
num_chains: 10
sinkhorn_n_iter: 300
scale_noise: 0.01
scale_noise_p: 0.1
batch_size: 256
max_epochs: 400

standardize_data_mean: false
standardize_data_std: false
skip_evaluation: true

norm_layers: true
res_connection: true
vi_norm: true
input_perm: false
sparse_init: false

save_dir: ${hydra:runtime.output_dir}/bayesdag_output
external_python: ${oc.env:CAUSAL_META_BAYESDAG_PYTHON,null}
external_timeout_s: 3600
device: "auto"

