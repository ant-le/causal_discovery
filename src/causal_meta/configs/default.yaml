# @package _global_

defaults:
  - logger: wandb
  - data: smoke
  - model: avici
  - trainer: default
  - inference: default
  - override /inference/dibs: smoke
  - override /inference/bayesdag: smoke
  - _self_

# Minimal default config for installed usage (
# `causal-meta` or `python -m causal_meta.main`).
name: "smoke_test"

# Smoke overrides: fast iteration with fewer optimizer steps.
trainer:
  max_optimizer_steps: 30
  log_every_n_steps: 1
  val_check_interval_steps: 10
  checkpoint_every_n_steps: 0

inference:
  n_samples: 8
  cache_compress: false
  cache_n_samples: null

hydra:
  run:
    dir: ${oc.env:CAUSAL_META_RUN_DIR,experiments/runs/${name}/${model.id}}
  sweep:
    dir: ${oc.env:CAUSAL_META_SWEEP_DIR,experiments/runs/${name}}
    subdir: ${model.id}
  output_subdir: null
