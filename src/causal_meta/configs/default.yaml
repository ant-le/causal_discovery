# @package _global_

defaults:
  - logger: wandb
  - data: smoke
  - model: avici
  - trainer: default
  - inference: default
  - _self_

# Minimal default config for installed usage (
# `causal-meta` or `python -m causal_meta.main`).
name: "smoke_test"

# Smoke overrides: fast iteration with fewer tasks.
trainer:
  max_tasks_seen: 240
  log_every_n_tasks: 8
  val_check_interval_tasks: 80
  checkpoint_every_n_tasks: 0

inference:
  n_samples: 8
  cache_compress: false
  cache_n_samples: null
  dibs:
    steps: 50
    n_particles: 8
  bayesdag:
    max_epochs: 1
    num_chains: 2
    sinkhorn_n_iter: 200
    external_timeout_s: 600

hydra:
  run:
    dir: ${oc.env:CAUSAL_META_RUN_DIR,experiments/runs/${name}/${model.id}}
  sweep:
    dir: ${oc.env:CAUSAL_META_SWEEP_DIR,experiments/runs/${name}}
    subdir: ${model.id}
  output_subdir: null
